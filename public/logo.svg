<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="catGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cat face -->
  <circle cx="100" cy="100" r="80" fill="url(#catGradient)"/>
  
  <!-- Ears -->
  <path d="M60 50 L40 20 L70 60 Z" fill="url(#catGradient)"/>
  <path d="M140 50 L160 20 L130 60 Z" fill="url(#catGradient)"/>
  
  <!-- Eyes -->
  <ellipse cx="75" cy="90" rx="8" ry="15" fill="white"/>
  <ellipse cx="125" cy="90" rx="8" ry="15" fill="white"/>
  <ellipse cx="75" cy="95" rx="4" ry="8" fill="#1f2937"/>
  <ellipse cx="125" cy="95" rx="4" ry="8" fill="#1f2937"/>
  
  <!-- Nose -->
  <path d="M100 105 L95 115 L105 115 Z" fill="#ec4899"/>
  
  <!-- Mouth -->
  <path d="M100 115 L100 125" stroke="white" stroke-width="2"/>
  <path d="M80 125 Q100 135 120 125" stroke="white" stroke-width="2" fill="none"/>
  
  <!-- Whiskers -->
  <line x1="50" y1="100" x2="70" y2="95" stroke="white" stroke-width="2"/>
  <line x1="50" y1="110" x2="70" y2="110" stroke="white" stroke-width="2"/>
  <line x1="150" y1="100" x2="130" y2="95" stroke="white" stroke-width="2"/>
  <line x1="150" y1="110" x2="130" y2="110" stroke="white" stroke-width="2"/>
</svg>
